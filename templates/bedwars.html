<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC',sans-serif;background:#0d1117;color:#e6edf3;width:540px;padding:24px}
.card{background:linear-gradient(135deg,#0d1117 0%,#1c1212 50%,#0d1117 100%);border-radius:14px;border:1px solid #30363d;padding:24px 28px}
.header{display:flex;align-items:center;gap:12px;padding-bottom:16px;border-bottom:2px solid #da3633}
.htitle{font-size:20px;font-weight:700;color:#f85149}
.hsub{font-size:13px;color:#8b949e;margin-top:1px}
.tag{background:#da3633;color:#fff;padding:3px 14px;border-radius:20px;font-size:13px;font-weight:700}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:14px 0}
.box{background:#1c2128;border-radius:10px;padding:12px 14px;text-align:center}
.lbl{font-size:11px;color:#8b949e}
.gv{font-size:18px;font-weight:700;margin-top:3px}
.green{color:#3fb950}.red{color:#f85149}.purple{color:#d2a8ff}.cyan{color:#58a6ff}
.hl{background:#241515;border-radius:10px;padding:14px;margin-top:10px;display:flex;justify-content:space-around}
.hl-item{text-align:center}
.hl-v{font-size:17px;font-weight:700;color:#58a6ff;margin-top:2px}
.info{margin-top:14px;padding-top:12px;border-top:1px solid #30363d;font-size:12px;color:#8b949e}
.info-row{display:flex;justify-content:space-between;margin-bottom:5px}
.info-v{font-size:14px}
</style></head>
<body>
<div class="card">
  <div class="header">
    <div style="font-size:26px;line-height:1">🛏️</div>
    <div style="flex:1"><div class="htitle">起床战争</div><div class="hsub">{{ display_name }}</div></div>
    <div class="tag">{{ level }}</div>
  </div>
  <div class="grid">
    <div class="box"><div class="lbl">胜场</div><div class="gv green">{{ wins }}</div></div>
    <div class="box"><div class="lbl">败场</div><div class="gv red">{{ losses }}</div></div>
    <div class="box"><div class="lbl">最终击杀</div><div class="gv purple" style="font-size:16px">{{ final_kills }}</div></div>
    <div class="box"><div class="lbl">最终死亡</div><div class="gv red" style="font-size:16px">{{ final_deaths }}</div></div>
  </div>
  <div class="hl">
    <div class="hl-item"><div class="lbl">FKDR</div><div class="hl-v">{{ fkdr }}</div></div>
    <div class="hl-item"><div class="lbl">K/D</div><div class="hl-v">{{ kdr }}</div></div>
    <div class="hl-item"><div class="lbl">W/L</div><div class="hl-v">{{ wlr }}</div></div>
  </div>
  <div class="info">
    <div class="info-row"><span>拆床</span><span class="info-v purple">{{ beds_broken }}</span></div>
    <div class="info-row"><span>丢床</span><span class="info-v red">{{ beds_lost }}</span></div>
    <div class="info-row"><span>连胜</span><span class="info-v green">{{ winstreak }}</span></div>
    <div class="info-row" style="margin-bottom:0"><span>总场次</span><span class="info-v" style="color:#e6edf3">{{ games_played }}</span></div>
  </div>
</div>
</body>
</html>
