<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC',sans-serif;background:#0d1117;color:#e6edf3;display:flex;justify-content:center;padding:24px}
.card{width:540px;background:linear-gradient(135deg,#0d1117 0%,#1c1212 50%,#0d1117 100%);border-radius:14px;border:1px solid #30363d;padding:24px 28px}
.hd{display:flex;align-items:center;gap:12px;padding-bottom:16px;border-bottom:2px solid #da3633}
.ht{font-size:20px;font-weight:700;color:#f85149}
.hs{font-size:13px;color:#8b949e;margin-top:1px}
.tg{background:#da3633;color:#fff;padding:3px 14px;border-radius:20px;font-size:13px;font-weight:700}
.grd{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:14px 0}
.bx{background:#1c2128;border-radius:10px;padding:12px 14px;text-align:center}
.lb{font-size:11px;color:#8b949e}
.gv{font-size:18px;font-weight:700;margin-top:3px}
.gr{color:#3fb950}.rd{color:#f85149}.pu{color:#d2a8ff}
.hl{background:#241515;border-radius:10px;padding:14px;margin-top:10px;display:flex;justify-content:space-around}
.hv{font-size:17px;font-weight:700;color:#58a6ff;margin-top:3px}
.ft{margin-top:14px;padding-top:12px;border-top:1px solid #30363d;font-size:12px;color:#8b949e}
.ft>div{display:flex;justify-content:space-between;margin-bottom:5px}
</style></head>
<body><div class="card">
<div class="hd">
<div style="font-size:26px;line-height:1">🛏️</div>
<div style="flex:1"><div class="ht">起床战争</div><div class="hs">{{ display_name }}</div></div>
<div class="tg">{{ level }}</div>
</div>
<div class="grd">
<div class="bx"><div class="lb">胜场</div><div class="gv gr">{{ wins }}</div></div>
<div class="bx"><div class="lb">败场</div><div class="gv rd">{{ losses }}</div></div>
<div class="bx"><div class="lb">最终击杀</div><div class="gv pu" style="font-size:16px">{{ final_kills }}</div></div>
<div class="bx"><div class="lb">最终死亡</div><div class="gv rd" style="font-size:16px">{{ final_deaths }}</div></div>
</div>
<div class="hl">
<div style="text-align:center"><div class="lb">FKDR</div><div class="hv">{{ fkdr }}</div></div>
<div style="text-align:center"><div class="lb">K/D</div><div class="hv">{{ kdr }}</div></div>
<div style="text-align:center"><div class="lb">W/L</div><div class="hv">{{ wlr }}</div></div>
</div>
<div class="ft">
<div><span>拆床</span><span style="color:#d2a8ff;font-size:14px">{{ beds_broken }}</span></div>
<div><span>丢床</span><span style="color:#f85149;font-size:14px">{{ beds_lost }}</span></div>
<div><span>连胜</span><span style="color:#3fb950;font-size:14px">{{ winstreak }}</span></div>
<div style="margin-bottom:0"><span>总场次</span><span style="color:#e6edf3;font-size:14px">{{ games_played }}</span></div>
</div>
</div></body>
</html>
