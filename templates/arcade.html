<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC',sans-serif;background:#0d1117;color:#e6edf3;display:flex;justify-content:center;padding:24px}
.card{width:540px;background:linear-gradient(135deg,#0d1117 0%,#1b1b0d 50%,#0d1117 100%);border-radius:14px;border:1px solid #30363d;padding:24px 28px}
.hd{display:flex;align-items:center;gap:12px;padding-bottom:16px;border-bottom:2px solid #d2a8ff}
.ht{font-size:20px;font-weight:700;color:#d2a8ff}
.hs{font-size:13px;color:#8b949e;margin-top:1px}
.gd{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin:16px 0}
.bx{background:#1c2128;border-radius:10px;padding:12px;text-align:center}
.lb{font-size:11px;color:#8b949e}
.gv{font-size:19px;font-weight:700;margin-top:3px}
.gr{color:#3fb950}.bl{color:#58a6ff}.pu{color:#d2a8ff}
.ls{margin-top:16px;padding-top:14px;border-top:1px solid #30363d}
.lh{font-size:13px;color:#8b949e;margin-bottom:10px}
.it{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #21262d;font-size:13px;color:#e6edf3}
.it span+span{color:#d2a8ff;font-weight:600}
</style></head>
<body><div class="card">
<div class="hd"><div style="font-size:26px;line-height:1">🕹️</div>
<div><div class="ht">街机游戏</div><div class="hs">{{ display_name }}</div></div></div>
<div class="gd">
<div class="bx"><div class="lb">总胜场</div><div class="gv gr">{{ wins }}</div></div>
<div class="bx"><div class="lb">总回合</div><div class="gv bl">{{ rounds_played }}</div></div>
<div class="bx"><div class="lb">硬币</div><div class="gv pu">{{ coins }}</div></div>
</div>
{% if top_games %}<div class="ls"><div class="lh">🏆 热门小游戏排行</div>
{% for g, w in top_games %}<div class="it"><span>{{ g }}</span><span>{{ w }} 胜</span></div>{% endfor %}
</div>{% endif %}
</div></body>
</html>
