<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC',sans-serif;background:#0d1117;color:#e6edf3;width:540px;padding:24px}
.card{background:linear-gradient(135deg,#0d1117 0%,#0d1b2a 50%,#0d1117 100%);border-radius:14px;border:1px solid #30363d;padding:24px 28px}
.header{display:flex;align-items:center;gap:12px;padding-bottom:16px;border-bottom:2px solid #58a6ff}
.htitle{font-size:20px;font-weight:700;color:#58a6ff}
.hsub{font-size:13px;color:#8b949e;margin-top:1px}
.tag{background:#58a6ff;color:#0d1117;padding:3px 14px;border-radius:20px;font-size:13px;font-weight:700}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:14px 0}
.box{background:#1c2128;border-radius:10px;padding:12px 14px;text-align:center}
.lbl{font-size:11px;color:#8b949e}
.gv{font-size:18px;font-weight:700;margin-top:3px}
.green{color:#3fb950}.red{color:#f85149}.purple{color:#d2a8ff}.cyan{color:#58a6ff}
.hl{background:#0f2640;border-radius:10px;padding:14px;margin-top:10px;display:flex;justify-content:space-around}
.info{margin-top:14px;padding-top:12px;border-top:1px solid #30363d}
.info-row{display:flex;justify-content:space-between;margin-bottom:5px;font-size:12px;color:#8b949e}
</style></head>
<body>
<div class="card">
  <div class="header">
    <div style="font-size:26px;line-height:1">🌌</div>
    <div style="flex:1"><div class="htitle">空岛战争</div><div class="hsub">{{ display_name }}</div></div>
    <div class="tag">{{ level }}</div>
  </div>
  <div class="grid">
    <div class="box"><div class="lbl">胜场</div><div class="gv green">{{ wins }}</div></div>
    <div class="box"><div class="lbl">败场</div><div class="gv red">{{ losses }}</div></div>
    <div class="box"><div class="lbl">击杀</div><div class="gv purple" style="font-size:16px">{{ kills }}</div></div>
    <div class="box"><div class="lbl">死亡</div><div class="gv red" style="font-size:16px">{{ deaths }}</div></div>
  </div>
  <div class="hl">
    <div style="text-align:center"><div class="lbl">K/D</div><div class="gv cyan" style="font-size:17px">{{ kdr }}</div></div>
    <div style="text-align:center"><div class="lbl">W/L</div><div class="gv cyan" style="font-size:17px">{{ wlr }}</div></div>
    <div style="text-align:center"><div class="lbl">Souls</div><div class="gv cyan" style="font-size:17px">{{ souls }}</div></div>
  </div>
  <div class="info">
    <div class="info-row"><span>总场次</span><span style="color:#e6edf3;font-size:14px">{{ games_played }}</span></div>
    <div class="info-row" style="margin-bottom:0"><span>Heads</span><span style="color:#d2a8ff;font-size:14px">{{ heads }}</span></div>
  </div>
</div>
</body>
</html>
