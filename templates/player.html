<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC',sans-serif;background:#0d1117;color:#e6edf3;display:flex;justify-content:center;padding:24px}
.card{width:540px;background:linear-gradient(135deg,#0d1117 0%,#161b22 50%,#0d1117 100%);border-radius:14px;border:1px solid #30363d;padding:24px 28px}
.hd{display:flex;align-items:center;gap:16px;padding-bottom:16px;border-bottom:2px solid #f0883e}
.av{width:52px;height:52px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,#f0883e,#da3633);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#fff}
.nm{font-size:21px;font-weight:700;color:#f0883e}
.sb{font-size:13px;color:#8b949e;margin-top:2px}
.tg{background:#f0883e;color:#0d1117;padding:3px 14px;border-radius:20px;font-size:13px;font-weight:700;white-space:nowrap}
.grd{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
.bx{background:#1c2128;border-radius:10px;padding:12px 14px}
.lb{font-size:11px;color:#8b949e;letter-spacing:.3px}
.vl{font-size:15px;font-weight:600;margin-top:3px;color:#e6edf3}
.gr{color:#3fb950}.bl{color:#58a6ff}
.ft{margin-top:16px;padding-top:14px;border-top:1px solid #21262d;font-size:12px;color:#8b949e}
.ft>div{display:flex;justify-content:space-between;margin-bottom:5px}
.ft span+span{color:#e6edf3;font-size:13px}
</style></head>
<body><div class="card">
<div class="hd">
<div class="av">{{ initials }}</div>
<div style="flex:1;min-width:0"><div class="nm">{{ display_name }}</div><div class="sb">{{ rank_display }}</div></div>
<div class="tg">Lv.{{ level }}</div>
</div>
<div class="grd">
<div class="bx"><div class="lb">UUID</div><div class="vl" style="word-break:break-all;font-size:13px">{{ uuid }}</div></div>
<div class="bx"><div class="lb">语言</div><div class="vl">{{ language }}</div></div>
<div class="bx" style="text-align:center"><div class="lb">Karma</div><div class="vl gr" style="font-size:18px">{{ karma }}</div></div>
<div class="bx" style="text-align:center"><div class="lb">Rank</div><div class="vl bl" style="font-size:18px">{{ rank }}</div></div>
</div>
<div class="ft">
<div><span>首次登录</span><span>{{ first_login }}</span></div>
<div style="margin-bottom:0"><span>最近活跃</span><span>{{ last_login }}</span></div>
</div>
</div></body>
</html>
