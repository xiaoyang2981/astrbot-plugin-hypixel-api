<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC',sans-serif;
  background:#0d1117;color:#e6edf3;width:540px;padding:24px
}
.card{
  background:linear-gradient(135deg,#0d1117 0%,#161b22 50%,#0d1117 100%);
  border-radius:14px;border:1px solid #30363d;padding:24px 28px
}
.header{display:flex;align-items:center;gap:16px;padding-bottom:16px;border-bottom:2px solid #f0883e}
.avatar{
  width:52px;height:52px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,#f0883e,#da3633);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;font-weight:700;color:#fff
}
.name{font-size:21px;font-weight:700;color:#f0883e}
.sub{font-size:13px;color:#8b949e;margin-top:2px}
.tag{background:#f0883e;color:#0d1117;padding:3px 14px;border-radius:20px;font-size:13px;font-weight:700;white-space:nowrap}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
.box{background:#1c2128;border-radius:10px;padding:12px 14px}
.lbl{font-size:11px;color:#8b949e;letter-spacing:.3px}
.val{font-size:15px;font-weight:600;margin-top:3px}
.green{color:#3fb950}
.blue{color:#58a6ff}
.footer{margin-top:16px;padding-top:14px;border-top:1px solid #21262d;font-size:12px;color:#8b949e}
.footer span{float:right;color:#e6edf3;font-size:13px}
</style></head>
<body>
<div class="card">
  <div class="header">
    <div class="avatar">{{ initials }}</div>
    <div style="flex:1;min-width:0">
      <div class="name">{{ display_name }}</div>
      <div class="sub">{{ rank_display }}</div>
    </div>
    <div class="tag">Lv.{{ level }}</div>
  </div>
  <div class="grid">
    <div class="box"><div class="lbl">UUID</div><div class="val" style="word-break:break-all;font-size:13px">{{ uuid }}</div></div>
    <div class="box"><div class="lbl">语言</div><div class="val">{{ language }}</div></div>
    <div class="box" style="text-align:center"><div class="lbl">Karma</div><div class="val green" style="font-size:18px">{{ karma }}</div></div>
    <div class="box" style="text-align:center"><div class="lbl">Rank</div><div class="val blue" style="font-size:18px">{{ rank }}</div></div>
  </div>
  <div class="footer">
    <div style="display:flex;justify-content:space-between;margin-bottom:6px"><span>首次登录</span><span style="color:#e6edf3;font-size:13px">{{ first_login }}</span></div>
    <div style="display:flex;justify-content:space-between"><span>最近活跃</span><span style="color:#e6edf3;font-size:13px">{{ last_login }}</span></div>
  </div>
</div>
</body>
</html>
