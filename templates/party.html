<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC',sans-serif;background:#0d1117;color:#e6edf3;width:540px;padding:24px}
.card{background:linear-gradient(135deg,#0d1117 0%,#1b0d1b 50%,#0d1117 100%);border-radius:14px;border:1px solid #30363d;padding:24px 28px}
.header{display:flex;align-items:center;gap:12px;padding-bottom:16px;border-bottom:2px solid #bc8cff}
.htitle{font-size:20px;font-weight:700;color:#bc8cff}
.hsub{font-size:13px;color:#8b949e;margin-top:1px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0}
.box{background:#1c2128;border-radius:10px;padding:12px;text-align:center}
.lbl{font-size:11px;color:#8b949e}
.gv{font-size:19px;font-weight:700;margin-top:3px}
.green{color:#3fb950}.cyan{color:#58a6ff}
.list{margin-top:16px;padding-top:14px;border-top:1px solid #30363d}
.lh{font-size:13px;color:#8b949e;margin-bottom:10px}
.item{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #21262d;font-size:13px}
</style></head>
<body>
<div class="card">
  <div class="header">
    <div style="font-size:26px;line-height:1">🎉</div>
    <div><div class="htitle">小游戏派对</div><div class="hsub">{{ display_name }}</div></div>
  </div>
  <div class="grid2">
    <div class="box"><div class="lbl">回合胜场</div><div class="gv green">{{ round_wins }}</div></div>
    <div class="box"><div class="lbl">总回合</div><div class="gv cyan">{{ total_rounds }}</div></div>
  </div>
  {% if mini_games %}
  <div class="list">
    <div class="lh">🎯 各小游戏胜场</div>
    {% for gname, gwins in mini_games %}
    <div class="item"><span>{{ gname }}</span><span style="color:#bc8cff;font-weight:600">{{ gwins }}</span></div>
    {% endfor %}
  </div>
  {% endif %}
</div>
</body>
</html>
