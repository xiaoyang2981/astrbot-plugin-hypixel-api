<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC',sans-serif;background:#0d1117;color:#e6edf3;display:flex;justify-content:center;padding:24px}
.card{width:540px;background:linear-gradient(135deg,#0d1117 0%,#1a120e 50%,#0d1117 100%);border-radius:14px;border:1px solid #30363d;padding:24px 28px}
.hd{display:flex;align-items:center;gap:12px;padding-bottom:16px;border-bottom:2px solid #7ee787}
.ht{font-size:20px;font-weight:700;color:#7ee787}
.hs{font-size:13px;color:#8b949e;margin-top:1px}
.tg{background:#7ee787;color:#0d1117;padding:3px 14px;border-radius:20px;font-size:13px;font-weight:700}
.grd{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:14px 0}
.bx{background:#1c2128;border-radius:10px;padding:12px;text-align:center}
.lb{font-size:11px;color:#8b949e}
.gv{font-size:17px;font-weight:700;margin-top:3px}
.gr{color:#3fb950}.rd{color:#f85149}.pu{color:#d2a8ff}.bl{color:#58a6ff}
.hl{background:#241a14;border-radius:10px;padding:14px;margin-top:10px;display:flex;justify-content:space-around}
.hv{font-size:16px;font-weight:700;margin-top:3px}
.ft{margin-top:14px;padding-top:12px;border-top:1px solid #30363d;font-size:12px;color:#8b949e}
.ft>div{display:flex;justify-content:space-between;margin-bottom:5px}
.mp{display:flex;justify-content:space-between;padding:4px 6px 4px 0;border-bottom:1px solid #21262d;font-size:12px;color:#8b949e}
</style></head>
<body><div class="card">
<div class="hd"><div style="font-size:26px;line-height:1">🧟</div>
<div style="flex:1"><div class="ht">丧尸末日</div><div class="hs">{{ display_name }}</div></div>
<div class="tg">{{ games_played }} 场</div></div>
<div class="grd">
<div class="bx"><div class="lb">胜场</div><div class="gv gr">{{ wins }}</div></div>
<div class="bx"><div class="lb">败场</div><div class="gv rd">{{ losses }}</div></div>
<div class="bx"><div class="lb">击杀</div><div class="gv pu" style="font-size:15px">{{ kills }}</div></div>
<div class="bx"><div class="lb">死亡</div><div class="gv rd" style="font-size:15px">{{ deaths }}</div></div>
</div>
<div class="hl">
<div style="text-align:center"><div class="lb">爆头</div><div class="hv pu">{{ headshots }}</div></div>
<div style="text-align:center"><div class="lb">开门</div><div class="hv bl">{{ doors_opened }}</div></div>
<div style="text-align:center"><div class="lb">开箱</div><div class="hv bl">{{ chests_looted }}</div></div>
</div>
<div class="ft">
<div><span>总生存回合</span><span style="color:#3fb950;font-size:14px">{{ rounds_survived }}</span></div>
<div style="margin-bottom:8px"><span>最佳回合</span><span style="color:#d2a8ff;font-size:14px">{{ best_round }}</span></div>
{% for m, r in maps %}<div class="mp"><span>🗺️ {{ m }}</span><span style="color:#e6edf3">最佳 {{ r }} 回合</span></div>{% endfor %}
</div>
</div></body>
</html>
